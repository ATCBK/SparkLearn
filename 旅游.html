<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五一行程安排</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {padding:20px;font-family:Arial,sans-serif;background:#f8f8f8;}
        h1 {text-align:center;margin-bottom:30px;color:#333;}
        .day {background:#fff;padding:20px;margin-bottom:20px;border-radius:8px;}
        .day h2 {color:#444;margin-bottom:15px;border-left:3px solid #007bff;padding-left:10px;}
        .schedule {line-height:1.8;color:#555;}
    </style>
</head>
<body>
    <h1>五一信阳→济南→青岛 行程事件</h1>
    
    <div class="day">
        <h2>5月1日</h2>
        <div class="schedule">
            上午：从信阳出发<br>
            中午：抵达济南<br>
            下午-晚上：济南游玩，晚间入住酒店
        </div>
    </div>

    <div class="day">
        <h2>5月2日</h2>
        <div class="schedule">
            全天：济南游玩
        </div>
    </div>

    <div class="day">
        <h2>5月3日</h2>
        <div class="schedule">
            凌晨：乘坐前往青岛的车票<br>
            晚上：抵达青岛，入住宾馆
        </div>
    </div>

    <div class="day">
        <h2>5月4日-5月5日</h2>
        <div class="schedule">
            5月4日晚上 或 5月5日凌晨：从青岛返程
        </div>
    </div>
</body>
</html>
