<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学而思 SparkLearn 登录页原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #07133b;
    --text: #172554;
    --muted: #64748b;
    --soft: #94a3b8;
    --line: rgba(37, 99, 235, .13);
    --blue: #0b74ff;
    --blue-2: #5aa2ff;
    --blue-soft: #eaf4ff;
    --card: rgba(255, 255, 255, .78);
    --white: #ffffff;
    --shadow: 0 28px 85px rgba(28, 86, 145, .16);
    --shadow-soft: 0 18px 50px rgba(29, 78, 216, .12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    background: #edf7ff;
    font-family: "DM Sans", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  button,
  input { font: inherit; }

  button { cursor: pointer; }

  .auth-page {
    position: relative;
    min-height: 100vh;
    overflow: hidden;
    padding: 0;
    background:
      linear-gradient(90deg, rgba(247, 252, 255, .5) 0%, rgba(235, 247, 255, .22) 48%, rgba(232, 244, 255, .42) 100%),
ni      url("assets/auth-home-bg.png") center / cover no-repeat;
  }

  .auth-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 76% 50%, rgba(255,255,255,.46), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(218,238,255,.16));
    pointer-events: none;
  }

  .brand {
    position: absolute;
    left: 78px;
    top: 58px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 16px;
  }

  .brand img {
    width: 68px;
    height: 56px;
    object-fit: contain;
    filter: drop-shadow(0 16px 26px rgba(0, 113, 227, .2));
  }

  .brand strong {
    display: block;
    color: #08133a;
    font-size: 27px;
    line-height: 1;
    letter-spacing: -.3px;
  }

  .brand span {
    display: block;
    margin-top: 7px;
    color: #334166;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .22em;
  }

  .layout {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 510px;
    align-items: start;
    gap: 64px;
    padding: 115px 104px 0 82px;
  }

  .intro {
    padding-top: 120px;
  }

  .intro h1 {
    margin: 0;
    max-width: 760px;
    color: #07133b;
    font-size: 66px;
    line-height: 1.18;
    letter-spacing: -.6px;
  }

  .intro h1 span {
    display: block;
    margin-top: 6px;
    color: var(--blue);
  }

  .intro p {
    max-width: 660px;
    margin: 30px 0 0;
    color: #435575;
    font-size: 20px;
    line-height: 1.78;
    font-weight: 500;
  }

  .feature-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 20px;
    max-width: 820px;
    margin-top: 58px;
  }

  .feature-card {
    min-height: 252px;
    padding: 26px;
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.64)),
      radial-gradient(circle at 88% 18%, rgba(90,162,255,.14), transparent 34%);
    border: 1px solid rgba(255,255,255,.8);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(22px) saturate(155%);
  }

  .feature-icon {
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    color: var(--blue);
    background: var(--blue-soft);
    box-shadow: inset 0 0 0 1px rgba(11,116,255,.12);
  }

  .feature-icon svg {
    width: 21px;
    height: 21px;
    stroke-width: 2.3;
  }

  .feature-card h2 {
    margin: 20px 0 0;
    color: #0b1744;
    font-size: 17px;
    line-height: 1.45;
  }

  .feature-card p {
    margin: 10px 0 0;
    color: #69758d;
    font-size: 14px;
    line-height: 1.65;
  }

  .mini-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 38px;
    padding: 10px 15px;
    border-radius: 999px;
    color: #2563eb;
    background: rgba(232, 244, 255, .8);
    font-size: 14px;
    font-weight: 700;
  }

  .progress {
    height: 7px;
    margin-top: 18px;
    border-radius: 999px;
    background: rgba(37, 99, 235, .12);
    overflow: hidden;
  }

  .progress i {
    display: block;
    height: 100%;
    width: 72%;
    border-radius: inherit;
    background: linear-gradient(90deg, #0b74ff, #4f9dff);
  }

  .path-dots {
    position: relative;
    height: 58px;
    margin-top: 32px;
  }

  .path-dots::before {
    content: "";
    position: absolute;
    left: 20px;
    right: 12px;
    top: 32px;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(11,116,255,.16), rgba(11,116,255,.46));
    transform: rotate(-18deg);
  }

  .dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #0b74ff;
    box-shadow: 0 8px 18px rgba(11,116,255,.28);
  }

  .dot:nth-child(1) { left: 18px; top: 37px; }
  .dot:nth-child(2) { left: 82px; top: 17px; opacity: .68; }
  .dot:nth-child(3) { right: 16px; top: 8px; opacity: .5; }

  .action-line {
    display: inline-grid;
    grid-template-columns: 1fr 52px;
    align-items: center;
    gap: 0;
    width: 144px;
    margin-top: 42px;
    border-radius: 999px;
    background: rgba(255,255,255,.68);
    border: 1px solid rgba(11,116,255,.18);
    overflow: hidden;
  }

  .action-line b {
    display: block;
    padding-left: 22px;
    color: #0b74ff;
    font-size: 15px;
  }

  .action-line span {
    height: 46px;
    display: grid;
    place-items: center;
    color: #0b74ff;
    border-left: 1px solid rgba(11,116,255,.14);
    font-size: 19px;
  }

  .login-card {
    width: 100%;
    min-height: 700px;
    margin-top: 0;
    padding: 58px 58px 34px;
    border-radius: 34px;
    background: rgba(255,255,255,.86);
    border: 1px solid rgba(255,255,255,.86);
    box-shadow: var(--shadow);
    backdrop-filter: blur(30px) saturate(160%);
  }

  .login-card h2 {
    margin: 0;
    color: #07133b;
    font-size: 33px;
    letter-spacing: -.2px;
  }

  .login-card .sub {
    margin: 14px 0 0;
    color: #6b7892;
    font-size: 17px;
  }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    margin-top: 38px;
    padding: 4px;
    border-radius: 19px;
    background: #edf5ff;
  }

  .tab {
    position: relative;
    height: 48px;
    border: 0;
    border-radius: 14px;
    background: transparent;
    color: #58657e;
    font-size: 17px;
    font-weight: 800;
  }

  .tab.active {
    color: #0b74ff;
    background: white;
    box-shadow: 0 8px 18px rgba(15, 77, 160, .08);
  }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 34%;
    right: 34%;
    bottom: -4px;
    height: 3px;
    border-radius: 999px;
    background: #0b74ff;
  }

  .form {
    display: grid;
    gap: 22px;
    margin-top: 38px;
  }

  .field { position: relative; }

  .field svg {
    position: absolute;
    left: 18px;
    top: 50%;
    width: 20px;
    height: 20px;
    transform: translateY(-50%);
    color: #53627d;
    stroke-width: 2;
    pointer-events: none;
  }

  input {
    width: 100%;
    height: 58px;
    border: 1px solid #d8e4f2;
    border-radius: 14px;
    background: rgba(255,255,255,.74);
    color: #0f172a;
    outline: none;
    padding: 0 52px;
    font-size: 16px;
    transition: .18s ease;
  }

  input::placeholder { color: #9aa6bb; }

  input:focus {
    border-color: rgba(11,116,255,.58);
    box-shadow: 0 0 0 4px rgba(11,116,255,.1);
    background: white;
  }

  .eye {
    position: absolute;
    right: 14px;
    top: 50%;
    width: 36px;
    height: 36px;
    border: 0;
    border-radius: 10px;
    color: #64748b;
    background: transparent;
    transform: translateY(-50%);
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-top: 2px;
  }

  .check {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: #4b5874;
    font-size: 15px;
  }

  .check input {
    width: 18px;
    height: 18px;
    padding: 0;
    accent-color: var(--blue);
  }

  .link {
    border: 0;
    padding: 0;
    color: #0b74ff;
    background: transparent;
    font-size: 15px;
    font-weight: 800;
  }

  .submit {
    height: 58px;
    border: 0;
    border-radius: 17px;
    color: white;
    background: linear-gradient(135deg, #075ff0, #5aa2ff);
    box-shadow: 0 16px 34px rgba(11,116,255,.24);
    font-size: 17px;
    font-weight: 900;
    transition: transform .18s ease, box-shadow .18s ease;
  }

  .submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 22px 44px rgba(11,116,255,.28);
  }

  .agreement {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-top: 42px;
    color: #7a879d;
    font-size: 14px;
  }

  .agreement svg {
    width: 18px;
    height: 18px;
    color: #8a99b0;
  }

  .agreement a {
    color: #0b74ff;
    font-weight: 800;
    text-decoration: none;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 30px;
    z-index: 5;
    transform: translateX(-50%) translateY(18px);
    padding: 12px 18px;
    border-radius: 999px;
    background: rgba(7,19,59,.9);
    color: white;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: .22s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 1280px) {
    .auth-page { padding: 38px 42px; }
    .layout {
      grid-template-columns: minmax(520px, 1fr) 500px;
      gap: 44px;
    }
    .intro h1 { font-size: 58px; }
    .feature-row { gap: 16px; }
    .feature-card { padding: 22px; }
    .login-card { padding: 48px 48px 36px; }
  }

  @media (max-width: 980px) {
    .auth-page {
      min-height: auto;
      padding: 28px 22px 42px;
      overflow: auto;
    }
    .brand img {
      width: 64px;
      height: 54px;
    }
    .brand strong { font-size: 24px; }
    .brand span {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: .12em;
    }
    .layout {
      min-height: auto;
      grid-template-columns: 1fr;
      gap: 26px;
      margin-top: 42px;
    }
    .intro { padding-top: 0; }
    .intro h1 { font-size: 42px; }
    .intro p {
      margin-top: 18px;
      font-size: 16px;
    }
    .feature-row {
      grid-template-columns: 1fr;
      margin-top: 26px;
    }
    .feature-card { min-height: auto; }
    .mini-pill,
    .path-dots,
    .action-line { margin-top: 20px; }
    .login-card {
      min-height: auto;
      padding: 32px 24px 26px;
      border-radius: 26px;
    }
  }

  @media (max-width: 560px) {
    .auth-page { padding: 18px 14px 28px; }
    .brand { gap: 10px; }
    .brand img {
      width: 52px;
      height: 44px;
    }
    .brand strong { font-size: 20px; }
    .intro h1 { font-size: 34px; }
    .intro p { font-size: 15px; }
    .login-card h2 { font-size: 28px; }
    .row {
      align-items: flex-start;
      flex-direction: column;
    }
    .agreement {
      align-items: flex-start;
      text-align: center;
      line-height: 1.6;
    }
  }
</style>
</head>
<body>
  <main class="auth-page">
    <div class="brand">
      <img src="assets/sparklearn-logo.png" alt="学而思 SparkLearn">
      <div>
        <strong>学而思 SparkLearn</strong>
        <span>智能个性化学习平台</span>
      </div>
    </div>

    <section class="layout">
      <div class="intro">
        <h1>让学习更懂你<span>成就每一次进步</span></h1>
        <p>基于你的目标、基础与学习偏好，智能规划专属学习路径，精准推荐资源，陪伴你高效成长。</p>

        <div class="feature-row">
          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="3.5"/><path d="M5 21a7 7 0 0 1 14 0"/><path d="M6.5 12.5a8 8 0 0 0 11 0"/></svg>
            </div>
            <h2>学习画像</h2>
            <p>数据驱动的个性化分析<br>全面了解你的学习情况</p>
            <div class="mini-pill">知识掌握度 72%</div>
            <div class="progress"><i></i></div>
          </article>

          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s7-6.1 7-11a7 7 0 1 0-14 0c0 4.9 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
            </div>
            <h2>当前学习路径</h2>
            <p>函数与导数进阶<br>第 3/8 阶段 · 进行中</p>
            <div class="path-dots" aria-hidden="true">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </article>

          <article class="feature-card">
            <div class="feature-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="6" y="4" width="12" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h3"/><path d="m16 3 1.5 2.5"/></svg>
            </div>
            <h2>今日推荐任务</h2>
            <p>导数的应用练习<br>巩固知识 · 提升能力</p>
            <div class="action-line">
              <b>去学习</b>
              <span>→</span>
            </div>
          </article>
        </div>
      </div>

      <aside class="login-card">
        <h2 id="formTitle">欢迎回来</h2>
        <p class="sub" id="formDesc">登录继续你的个性化学习之旅</p>

        <div class="tabs" role="tablist" aria-label="登录注册切换">
          <button class="tab active" id="loginTab" type="button" role="tab" aria-selected="true">登录</button>
          <button class="tab" id="registerTab" type="button" role="tab" aria-selected="false">注册</button>
        </div>

        <form class="form" id="authForm">
          <div class="field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
            <input id="email" type="email" placeholder="请输入邮箱" autocomplete="email">
          </div>

          <div class="field">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
            <button class="eye" type="button" data-target="password" aria-label="显示或隐藏密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div class="field" id="confirmField" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
            <input id="confirmPassword" type="password" placeholder="请再次输入密码" autocomplete="new-password">
            <button class="eye" type="button" data-target="confirmPassword" aria-label="显示或隐藏确认密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div class="row">
            <label class="check">
              <input type="checkbox">
              <span>记住我</span>
            </label>
            <button class="link" id="forgotBtn" type="button">忘记密码？</button>
          </div>

          <button class="submit" id="submitBtn" type="submit">立即登录</button>
        </form>

        <div class="agreement">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-5"/></svg>
          <span>登录即表示同意 <a href="#">《用户协议》</a> 与 <a href="#">《隐私政策》</a></span>
        </div>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast">密码找回暂未接入，请联系老师或管理员。</div>

<script>
  const loginTab = document.getElementById('loginTab');
  const registerTab = document.getElementById('registerTab');
  const confirmField = document.getElementById('confirmField');
  const formTitle = document.getElementById('formTitle');
  const formDesc = document.getElementById('formDesc');
  const submitBtn = document.getElementById('submitBtn');
  const toast = document.getElementById('toast');
  let mode = 'login';

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    window.setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function setMode(nextMode) {
    mode = nextMode;
    const isLogin = mode === 'login';
    loginTab.classList.toggle('active', isLogin);
    registerTab.classList.toggle('active', !isLogin);
    loginTab.setAttribute('aria-selected', String(isLogin));
    registerTab.setAttribute('aria-selected', String(!isLogin));
    confirmField.hidden = isLogin;
    formTitle.textContent = isLogin ? '欢迎回来' : '创建账号';
    formDesc.textContent = isLogin ? '登录继续你的个性化学习之旅' : '注册后开启你的个性化学习之旅';
    submitBtn.textContent = isLogin ? '立即登录' : '立即注册';
  }

  loginTab.addEventListener('click', () => setMode('login'));
  registerTab.addEventListener('click', () => setMode('register'));

  document.querySelectorAll('.eye').forEach((btn) => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });

  document.getElementById('forgotBtn').addEventListener('click', () => {
    showToast('密码找回暂未接入，请联系老师或管理员。');
  });

  document.getElementById('authForm').addEventListener('submit', (event) => {
    event.preventDefault();
    const oldText = submitBtn.textContent;
    submitBtn.textContent = mode === 'login' ? '正在登录...' : '正在注册...';
    submitBtn.disabled = true;
    window.setTimeout(() => {
      submitBtn.textContent = oldText;
      submitBtn.disabled = false;
      showToast(mode === 'login' ? '演示流程：登录成功。' : '演示流程：注册成功。');
    }, 850);
  });
</script>
</body>
</html>
