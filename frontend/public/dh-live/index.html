<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DH_live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #loadingSpinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-size: 14px; z-index: 100; }
    #background_video { display: none; }
    #canvas_video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
    #canvas_gl { position: absolute; top: -9999px; left: -9999px; }
    #canvasEl { position: absolute; left: -9999px; top: -9999px; }
    #screen { position: absolute; bottom: -1000px; right: -1000px; width: 1px; height: 1px; }
    #screen2 { display: none; }
    #startMessage { display: none; }
  </style>
</head>
<body>
<div id="loadingSpinner">数字人加载中...</div>
<canvas id="canvasEl"></canvas>
<video id="background_video" muted playsinline></video>
<canvas id="canvas_video"></canvas>
<canvas id="canvas_gl" width="184" height="184"></canvas>
<div id="screen"></div>
<div id="screen2"></div>
<div id="startMessage"></div>

<script src="js/pako.min.js"></script>
<script src="js/DHLiveMini.js"></script>
<script src="js/MiniLive2.js"></script>
<script>
  // Override CONFIG after MiniLive2.js loads, before MiniMateLoader.js
  CONFIG.backgroundVideoSrc = '';
  // Notify parent when ready
  var __dhNotifyReady = function() {
    try { parent.postMessage('dh-live-ready', '*'); } catch(e) {}
  };
</script>
<script src="js/MiniMateLoader.js"></script>
<script>
  // Check periodically and notify parent when WASM is ready
  var __checkCount = 0;
  var __checkInterval = setInterval(function() {
    __checkCount++;
    if (typeof Module !== 'undefined' && Module._processImage) {
      clearInterval(__checkInterval);
      __dhNotifyReady();
    } else if (__checkCount > 100) {
      clearInterval(__checkInterval);
      document.getElementById('loadingSpinner').textContent = '加载超时，请刷新';
    }
  }, 200);
</script>
</body>
</html>
