<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人模型预览</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 16px; left: 16px; color: #fff; font-size: 12px;
    background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px;
  }
  #controls {
    position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
  }
  #controls button {
    padding: 8px 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5);
    color: #fff; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  #controls button:hover { background: rgba(124,77,255,0.4); }
  #controls button.active { background: rgba(124,77,255,0.6); border-color: #7c4dff; }
</style>
</head>
<body>
<div id="controls">
  <button id="btnIdle">待机</button>
  <button id="btnSpeak">说话</button>
  <button id="btnListen">聆听</button>
  <button id="btnThink">思考</button>
  <button id="btnBlink">眨眼</button>
  <button id="btnRotate">自动旋转</button>
</div>
<div id="info">加载中...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin } from 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.min.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 0.8, 2.8);
camera.lookAt(0, 0.8, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.enableDamping = true;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
light1.position.set(2, 3, 4);
scene.add(light1);
const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
light2.position.set(-1, 2, -2);
scene.add(light2);

// Grid
const grid = new THREE.GridHelper(4, 20, 0x444444, 0x222222);
grid.position.y = 0;
scene.add(grid);

let modelGroup, faceMesh;
let morphTargets = [];
let morphDict = {};
let clock = new THREE.Clock();
let state = 'idle';
let autoRotate = false;
let speakIndex = 0;
let speakTimer = 0;
let blinkTimer = 0, blinkActive = false, blinkProgress = 0;

// VRM mouth shapes for speaking
const vrmMouthShapes = [
  'Face_Blendshape.Fcl_MTH_A',
  'Face_Blendshape.Fcl_MTH_I',
  'Face_Blendshape.Fcl_MTH_U',
  'Face_Blendshape.Fcl_MTH_E',
  'Face_Blendshape.Fcl_MTH_O',
  'Face_Blendshape.Fcl_MTH_Small',
  'Face_Blendshape.Fcl_MTH_Large',
  'Face_Blendshape.Fcl_MTH_Up',
  'Face_Blendshape.Fcl_MTH_Down',
];

// Helper: find morph index by partial name match
function findMorph(partial) {
  return morphTargets.findIndex(n => n.includes(partial));
}

let vrm = null;
const loader = new GLTFLoader();
loader.register((parser) => new VRMLoaderPlugin(parser));
window.scene = scene;
window.modelGroup = null;
loader.load('/avatars/avatar-test.glb', (gltf) => {
  vrm = gltf.userData.vrm;
  modelGroup = vrm.scene;
  window.modelGroup = modelGroup;
  scene.add(modelGroup);

  // Get blendshape names from VRM
  const blendShapeProxy = vrm.expressionManager;
  if (blendShapeProxy) {
    morphTargets = blendShapeProxy.expressionMap ? Object.keys(blendShapeProxy.expressionMap) : [];
  }

  // Also find face mesh for direct morph access
  modelGroup.traverse(child => {
    if (child.isMesh && child.morphTargetDictionary && !faceMesh) {
      faceMesh = child;
      morphDict = child.morphTargetDictionary;
      if (morphTargets.length === 0) morphTargets = Object.keys(morphDict);
    }
  });

  let meshCount = 0;
  modelGroup.traverse(c => { if (c.isMesh) meshCount++; });
  document.getElementById('info').innerHTML =
    `VRM模型已加载 | 网格: ${meshCount} | 表情: ${morphTargets.length}`;
  console.log('VRM expressions:', morphTargets);
}, undefined, (err) => {
  document.getElementById('info').textContent = '加载失败: ' + err.message;
});

// Buttons
document.getElementById('btnIdle').addEventListener('click', () => { state = 'idle'; speakIndex = 0; });
document.getElementById('btnSpeak').addEventListener('click', () => { state = 'speak'; });
document.getElementById('btnListen').addEventListener('click', () => { state = 'listen'; });
document.getElementById('btnThink').addEventListener('click', () => { state = 'think'; });
document.getElementById('btnBlink').addEventListener('click', () => {
  blinkActive = true; blinkProgress = 0;
});
document.getElementById('btnRotate').addEventListener('click', function() {
  autoRotate = !autoRotate;
  this.classList.toggle('active', autoRotate);
});

function setExpression(name, value) {
  if (vrm && vrm.expressionManager) {
    vrm.expressionManager.setValue(name, value);
  } else if (faceMesh && faceMesh.morphTargetInfluences) {
    const idx = morphTargets.indexOf(name);
    if (idx >= 0) faceMesh.morphTargetInfluences[idx] = value;
  }
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  if (autoRotate && modelGroup) {
    modelGroup.rotation.y += dt * 0.5;
  }

  if (faceMesh && faceMesh.morphTargetInfluences) {
    // Reset all morphs
    for (let i = 0; i < faceMesh.morphTargetInfluences.length; i++) {
      faceMesh.morphTargetInfluences[i] = 0;
    }

    // Blink
    blinkTimer += dt;
    if (blinkActive) {
      blinkProgress += dt * 5;
      if (blinkProgress >= 1) { blinkActive = false; blinkProgress = 0; blinkTimer = 0; }
    } else if (blinkTimer > 3 + Math.random() * 2 && state === 'idle') {
      blinkActive = true; blinkProgress = 0; blinkTimer = 0;
    }

    const blinkW = blinkActive
      ? (blinkProgress < 0.5 ? blinkProgress * 2 : 2 - blinkProgress * 2)
      : 0;

    // VRM blink
    setExpression('blink', blinkW);
    // Fallback: direct morph
    if (!vrm) {
      setExpression('Face_Blendshape.Fcl_EYE_Close', blinkW);
    }

    // State-based expressions
    if (state === 'speak') {
      speakTimer += dt;
      if (speakTimer > 0.12) {
        speakTimer = 0;
        speakIndex = (speakIndex + 1) % vrmMouthShapes.length;
      }
      // Try VRM standard viseme names first, then fallback to direct morph
      const visemeNames = ['aa', 'ih', 'ou', 'ee', 'oh'];
      const visemeIdx = speakIndex % visemeNames.length;
      setExpression(visemeNames[visemeIdx], 1.0);
      setExpression(vrmMouthShapes[speakIndex], 1.0);
      setExpression('happy', 0.3);
      setExpression('Face_Blendshape.Fcl_EYE_Joy', 0.3);
      setExpression('Face_Blendshape.Fcl_BRW_Joy', 0.2);
    }

    if (state === 'listen') {
      setExpression('surprised', 0.2);
      setExpression('Face_Blendshape.Fcl_EYE_Spread', 0.3);
      setExpression('Face_Blendshape.Fcl_BRW_Surprised', 0.2);
    }

    if (state === 'think') {
      setExpression('angry', 0.15);
      setExpression('Face_Blendshape.Fcl_EYE_Angry', 0.2);
      setExpression('Face_Blendshape.Fcl_BRW_Angry', 0.15);
      setExpression('Face_Blendshape.Fcl_MTH_Small', 0.3);
    }

    // Head rotation per state
    if (modelGroup) {
      const targetRy = state === 'listen' ? 0.15 : state === 'think' ? -0.1 : 0;
      modelGroup.rotation.y += (targetRy - modelGroup.rotation.y) * dt * 2;
    }
  }

  // Update VRM
  if (vrm) {
    vrm.update(dt);
  }

  // Breathing
  if (modelGroup) {
    modelGroup.position.y = Math.sin(performance.now() * 0.001 * 0.8) * 0.005;
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
